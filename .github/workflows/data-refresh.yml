name: Monthly Data Refresh

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    name: Refresh Data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install -e .

      - name: Restore DVF cache
        uses: actions/cache@v4
        with:
          path: data/dvf.parquet
          key: dvf-parquet-${{ github.run_id }}
          restore-keys: dvf-parquet-

      - name: Fetch DVF data
        run: immo fetch -c config/default.yml

      - name: Analyze data
        run: immo analyze -c config/default.yml

      - name: Generate report
        run: immo report -c config/default.yml

      - name: Run forecast (non-fatal)
        run: immo forecast -c config/default.yml || true

      - name: Set date tag
        id: tag
        run: echo "name=dvf-$(date +%Y-%m)" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: data-refresh-${{ steps.tag.outputs.name }}
          path: |
            outputs/
            reports/
            charts/
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "Data Refresh ${{ steps.tag.outputs.name }}"
          generate_release_notes: true
          files: |
            outputs/metrics_communes_monthly.csv
            reports/rapport_dvf.pdf

      - name: Regenerate README charts
        run: python scripts/generate_readme_charts.py

      - name: Commit updated charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/
          if git diff --cached --quiet; then
            echo "No chart changes to commit."
          else
            git commit -m "chore(data): update charts [$(date +%Y-%m)]"
            git push
          fi
